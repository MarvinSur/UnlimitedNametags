name: Build UnlimitedNametags

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Java 25 dulu (untuk toolchain compile, bukan run Gradle)
      - name: Setup Java 25 (compilation toolchain)
        uses: actions/setup-java@v4
        id: setup-java-25
        with:
          distribution: temurin
          java-version: 25

      # Java 21 jadi JAVA_HOME default — ini yang dipake Gradle buat jalan
      - name: Setup Java 21 (Gradle runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew shadowJar --no-daemon --stacktrace
        env:
          # Kasih tau Gradle dimana Java 25 ada buat toolchain
          JAVA_25_HOME: ${{ steps.setup-java-25.outputs.path }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnlimitedNametags-${{ github.sha }}
          path: target/UnlimitedNametags.jar
          if-no-files-found: error
